<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Create Found Pet Post | PetFinder</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Font Awesome -->
<link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Custom CSS -->
<link rel="stylesheet" href="../css/makeFoundPost.css">


</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 overflow-x-hidden">


<!-- ================= Loader ================= -->

<div id="loader"
    class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">

    <div class="glass-card rounded-3xl p-8 text-center">

        <div
            class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4">
        </div>

        <p class="text-gray-700 font-medium">
            Creating your post...
        </p>

    </div>

</div>

<!-- ================= Navbar ================= -->

<nav class="gradient-bg shadow-2xl sticky top-0 z-40">

    <div class="max-w-7xl mx-auto px-6 py-4">

        <div class="flex justify-between items-center">

            <!-- Logo -->

            <div class="flex items-center space-x-3">

                <div
                    class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur-sm flex items-center justify-center">

                    <i class="fas fa-paw text-white text-xl"></i>

                </div>

                <h1 class="text-2xl font-bold text-white">
                    PetFinder
                </h1>

            </div>

            <!-- Desktop Menu -->

            <ul class="hidden md:flex items-center space-x-8 text-white">

                <li>
                    <a href="./homePage.html"
                        class="hover:text-yellow-300 transition">
                        Home
                    </a>
                </li>

                <li>
                    <a href="./foundPostSection.html"
                        class="hover:text-yellow-300 transition">
                        Found Posts
                    </a>
                </li>

                <li>
                    <a href="./lostPostSection.html"
                        class="hover:text-yellow-300 transition">
                        Lost Posts
                    </a>
                </li>

            </ul>

            <!-- Profile -->

            <div class="relative">

                <button id="profileBtn"
                    class="flex items-center gap-2 bg-white/20 rounded-full px-4 py-2 hover:bg-white/30">

                    <div
                        class="w-8 h-8 rounded-full bg-gradient-to-r from-pink-400 to-orange-400 text-white flex items-center justify-center font-bold">

                        P

                    </div>

                    <span class="user_Name_Profile hidden sm:block text-white">
                        John
                    </span>

                    <i class="fas fa-chevron-down text-white text-xs"></i>

                </button>

                <!-- Dropdown -->

                <div id="dropdownMenu"
                    class="hidden absolute right-0 mt-3 w-56 glass-card rounded-2xl shadow-2xl py-2">

                    <a href="./profilePage.html"
                        class="flex items-center px-4 py-3 hover:bg-white/20">

                        <i class="fas fa-user mr-3 text-indigo-500"></i>

                        Profile

                    </a>

                    <a href="./profilePage.html"
                        class="flex items-center px-4 py-3 hover:bg-white/20">

                        <i class="fas fa-edit mr-3 text-green-500"></i>

                        My Posts

                    </a>

                    <hr class="my-2">

                    <a onclick="logout()"
                        class="flex items-center px-4 py-3 text-red-600 hover:bg-red-50 cursor-pointer">

                        <i class="fas fa-sign-out-alt mr-3"></i>

                        Logout

                    </a>

                </div>

            </div>

            <!-- Mobile Menu -->

            <div class="md:hidden">

                <button id="mobileMenuBtn"
                    class="bg-white/20 rounded-lg p-2 text-white">

                    <i class="fas fa-bars"></i>

                </button>

            </div>

        </div>

    </div>

</nav>

<!-- ================= Hero Section ================= -->

<section class="relative py-14 overflow-hidden">

    <div class="absolute inset-0 bg-gradient-to-r from-indigo-500/10 to-purple-500/10"></div>

    <div class="relative max-w-7xl mx-auto px-6 text-center">

        <h1 class="text-5xl md:text-6xl font-bold text-gray-800 mb-5">

            Help a
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">
                Found Pet
            </span>
            Find Its Home

        </h1>

        <p class="text-lg text-gray-600 max-w-2xl mx-auto">

            Share details about a found pet and help reunite it with its owner.

        </p>

    </div>

</section>

<!-- ================= Form Section ================= -->

<section class="max-w-5xl mx-auto px-6 pb-20">

    <div class="form-container rounded-3xl shadow-2xl p-8 md:p-10">

        <form id="postForm" class="space-y-8">

            <!-- ================= Image Upload ================= -->

<div class="text-center">

<h2 class="text-3xl font-bold text-gray-800 mb-3">
    <i class="fas fa-camera text-indigo-600 mr-2"></i>
    Add Pet Photo
</h2>

<p class="text-gray-600 mb-8">
    Upload a clear photo of the found pet.
</p>

<label for="petImage" class="cursor-pointer block">

    <div id="imagePreview"
        class="image-upload-container w-64 h-64 mx-auto rounded-3xl flex items-center justify-center overflow-hidden">

        <div id="uploadContent" class="text-center">

            <div
                class="w-20 h-20 rounded-2xl bg-gradient-to-r from-indigo-500 to-purple-600 flex items-center justify-center mx-auto mb-4">

                <i id="cameraIcon" class="fas fa-camera text-white text-3xl"></i>

            </div>

            <h3 class="font-semibold text-lg">
                Upload Image
            </h3>

            <p class="text-sm text-gray-500">
                Click to browse
            </p>

        </div>

        <input
            id="petImage"
            type="file"
            class="hidden"
            accept="image/*"
            required>

    </div>

</label>


</div>

<!-- ================= Description ================= -->

<div>


<label class="block font-semibold text-gray-700 mb-2">

    Pet Description

</label>

<textarea
    id="postDescription"
    maxlength="500"
    required
    class="input-field w-full rounded-2xl px-6 py-4 h-32 resize-none"
    placeholder="Describe the pet, color, size, breed, collar, injuries, etc."></textarea>


</div>

<!-- ================= Pet Details ================= -->

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">


<div>

    <label class="block font-semibold text-gray-700 mb-2">

        Pet Type

    </label>

    <select
        id="petType"
        required
        class="input-field w-full rounded-2xl px-5 py-4">

        <option value="">Select Pet</option>
        <option value="Dog">Dog</option>
        <option value="Cat">Cat</option>

    </select>

</div>

<div>

    <label class="block font-semibold text-gray-700 mb-2">

        Breed

    </label>

    <input
        id="breed"
        type="text"
        class="input-field w-full rounded-2xl px-5 py-4"
        placeholder="Golden Retriever">

</div>

<div>

    <label class="block font-semibold text-gray-700 mb-2">

        Color

    </label>

    <input
        id="color"
        type="text"
        class="input-field w-full rounded-2xl px-5 py-4"
        placeholder="Brown & White">

</div>

<div>

    <label class="block font-semibold text-gray-700 mb-2">

        Gender

    </label>

    <select
        id="gender"
        class="input-field w-full rounded-2xl px-5 py-4">

        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>

    </select>

</div>


</div>

<!-- ================= Location ================= -->

<div class="bg-blue-50 rounded-3xl p-6 border border-blue-100">


<h3 class="text-2xl font-bold mb-6 text-gray-800">

    <i class="fas fa-map-marker-alt text-blue-600 mr-2"></i>

    Location Details

</h3>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">

    <div>

        <label class="block font-semibold mb-2">

            State

        </label>

        <select
            id="state"
            required
            class="input-field w-full rounded-2xl px-5 py-4">

            <option value="">Select State</option>

        </select>

    </div>

    <div>

        <label class="block font-semibold mb-2">

            District

        </label>

        <select
            id="district"
            required
            class="input-field w-full rounded-2xl px-5 py-4">

            <option value="">Select District</option>

        </select>

    </div>

    <div>

        <label class="block font-semibold mb-2">

            City

        </label>

        <select
            id="city"
            required
            class="input-field w-full rounded-2xl px-5 py-4">

            <option value="">Select City</option>

        </select>

    </div>

    <div>

        <label class="block font-semibold mb-2">

            Landmark

        </label>

        <input
            id="landmark"
            type="text"
            class="input-field w-full rounded-2xl px-5 py-4"
            placeholder="Near Bus Stand">

    </div>

</div>


</div>

<!-- ================= Contact ================= -->

<div class="bg-green-50 rounded-3xl p-6 border border-green-100">


<h3 class="text-2xl font-bold text-gray-800 mb-6">

    <i class="fas fa-user text-green-600 mr-2"></i>

    Contact Information

</h3>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <div>

        <label class="block font-semibold mb-2">

            Finder Name

        </label>

        <input
            id="finderName"
            type="text"
            class="input-field w-full rounded-2xl px-5 py-4"
            placeholder="Enter Your Name">

    </div>

    <div>

        <label class="block font-semibold mb-2">

            Contact Number

        </label>

        <input
            id="contactNumber"
            required
            type="tel"
            pattern="^[6-9][0-9]{9}$"
            class="input-field w-full rounded-2xl px-5 py-4"
            placeholder="9876543210">

    </div>

</div>


</div>

<!-- ================= Buttons ================= -->

<div class="flex flex-col md:flex-row gap-4 pt-4">

<button
    type="submit"
    class="gradient-button text-white py-4 rounded-2xl flex-1 font-bold">

    <i class="fas fa-plus-circle mr-2"></i>

    Create Found Post

</button>

<button
    type="button"
    onclick="window.location.href='./foundPostSection.html'"
    class="bg-gray-200 hover:bg-gray-300 rounded-2xl px-8 py-4">

    <i class="fas fa-arrow-left mr-2"></i>

    Back

</button>


</div>

        </form>

    </div>

</section>

<!-- ================= JavaScript ================= -->

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Configuration -->
<script src="../js/common/config.js"></script>

<!-- Location Data -->
<script src="../js/common/location-data.js"></script>

<!-- Location Dropdown -->
<script src="../js/common/location-dropdown.js"></script>

<!-- Main API -->
<script src="../js/api/main.js"></script>

<!-- Found Post API -->
<script src="../js/api/makeFoundPost.js"></script>

<!-- Logout -->
<script src="../js/api/logout.js"></script>

<!-- UI -->
<script src="../js/ui/makeFoundPost-ui.js"></script>


</body>

</html>
